<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack Reader</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="toast-container"></div>

    <header>
        <span><strong>AquaTrack</strong> Reader</span>
        <div style="display: flex; gap: var(--space-sm);">
            <button class="btn btn-secondary" id="theme-toggle" style="width: auto; padding: 0.5rem; font-size: 1.2rem;">
                🌓
            </button>
            <button class="btn btn-secondary" id="logout-btn" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2 id="welcome-msg">Loading...</h2>
            <p class="text-secondary">Field Operations</p>
        </div>

        <div class="dash-row">
            <div class="dash-item">
                <span class="dash-label">To Read</span>
                <div class="dash-value">--</div>
            </div>
            <div class="dash-item">
                <span class="dash-label">Completed</span>
                <div class="dash-value">--</div>
            </div>
        </div>

        <div class="card">
            <h3>Capture Reading</h3>
            <p class="text-secondary mt-1">Select an assigned zone or search for an account to begin.</p>
            <button class="btn btn-primary mt-1" onclick="window.location.href='read-meter.html'">
                Go to Meter Scanner
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { logout } from '../js/auth.js';
        import { requireRole, setTheme } from '../js/utils.js';

        // 1. Initialize Theme from localStorage immediately
        const savedTheme = localStorage.getItem('aqt_theme') || 'light';
        document.documentElement.dataset.theme = savedTheme;

        // 2. Protection: If not a reader, kick them back to login
        requireRole('reader');

        // 3. Personalize UI
        const name = sessionStorage.getItem('aqt_user_name');
        document.getElementById('welcome-msg').textContent = `Mabuhay, ${name}!`;

        // 4. Handle Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const currentTheme = document.documentElement.dataset.theme;
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        };

        // 5. Setup Logout
        document.getElementById('logout-btn').onclick = logout;
    </script>
</body>
</html>
