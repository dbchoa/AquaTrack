<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AquaTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { water: '#4facfe' },
                    borderRadius: { '32': '32px' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#020617] font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <header></header>

    <main class="max-w-xl mx-auto p-6 pt-12 pb-32">
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black tracking-tighter text-slate-800 dark:text-white uppercase">Reader Dashboard</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2 opacity-60">Field Telemetry Terminal</p>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="glass-card p-6 rounded-32 border border-white dark:border-slate-800 shadow-xl bg-white/50 dark:bg-slate-900/50">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Zone</p>
                <h3 id="display-zone" class="text-2xl font-light tracking-tight text-water">Zone A</h3>
            </div>
            <div class="glass-card p-6 rounded-32 border border-white dark:border-slate-800 shadow-xl bg-white/50 dark:bg-slate-900/50">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Logs</p>
                <h3 id="display-readings" class="text-3xl font-bold tracking-tighter">0</h3>
            </div>
        </div>

        <div class="flex items-center justify-between mb-8 px-2">
            <h2 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400">Activity History</h2>
            <div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800 ml-6 opacity-40"></div>
        </div>

        <div id="readings-feed" class="space-y-4">
            <div class="text-center py-20 text-slate-400 animate-pulse uppercase text-[10px] tracking-widest font-bold">
                Awaiting Telemetry...
            </div>
        </div>
    </main>

    <div class="fixed bottom-10 left-0 w-full flex justify-center z-50">
        <button onclick="window.location.href='read-meter.html'" 
            class="px-12 py-5 rounded-full bg-water text-white text-xs font-bold uppercase tracking-[0.25em] shadow-2xl shadow-water/40 hover:scale-105 active:scale-95 transition-all">
            Initialize Reading
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script type="module">
        import { injectHeader } from '../js/header-component.js';
        import { db, auth } from '../js/firebase-init.js';
        import '../js/utils.js'; 

        injectHeader(); 

        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = '../index.html';
        });
    </script>
</body>
</html>
