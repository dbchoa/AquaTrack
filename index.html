<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack - Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* [Inference]: Using local overrides to ensure layout precision regardless of style.css state */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-droplet {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
            color: white !important;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(79, 172, 254, 0.3);
            transition: all 0.3s ease;
            outline: none !important; /* Removes the rectangular focus ring */
        }

        .btn-droplet:focus {
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.5); /* Rounded focus glow */
        }

        .btn-droplet:active {
            transform: translateY(2px);
        }

        .font-light-sans {
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        .input-focus:focus-within {
            border-color: #4facfe !important;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        
        /* [Inference]: Overriding potential bold defaults from global styles */
        h1, h2, label {
            font-weight: 500 !important;
        }
    </style>
</head>
<body class="glass-blur">
    <div id="toast-container" class="fixed pt-12 pr-4 z-max" style="top:0; right:0;"></div>
    
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <main class="login-wrapper">
        <div class="text-center mb-8">
            <div class="haptic" style="display: inline-flex; align-items: center; justify-content: center; width: 72px; height: 72px; background: white; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 1.5rem;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="#4facfe">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-light-sans text-main m-0">
                Aqua<span style="color: #4facfe;">Track</span>
            </h1>
            <p class="text-muted text-xs uppercase tracking-widest mt-2" style="opacity: 0.5;">Subdivision Gateway</p>
        </div>

        <div class="glass-card p-8 rounded-32 w-full shadow-xl" style="background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);">
            <h2 class="text-center text-xl mb-8 text-main">Sign In</h2>
            
            <form id="login-form" class="flex flex-col gap-5">
                <div class="form-group">
                    <label class="text-xs uppercase tracking-widest ml-1 mb-2 block" style="color: #666;">Personnel ID</label>
                    <div class="glass-well rounded-16 input-focus" style="background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); overflow: hidden;">
                        <input type="email" id="email" placeholder="name@aquatrack.sys" required class="w-full p-4 bg-transparent border-none outline-none font-light-sans">
                    </div>
                </div>

                <div class="form-group">
                    <label class="text-xs uppercase tracking-widest ml-1 mb-2 block" style="color: #666;">Access Key</label>
                    <div class="glass-well rounded-16 input-focus" style="background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); overflow: hidden;">
                        <input type="password" id="password" placeholder="••••••••" required class="w-full p-4 bg-transparent border-none outline-none font-light-sans">
                    </div>
                </div>

                <button type="submit" class="btn-droplet w-full py-4 rounded-full haptic" id="login-btn">
                    <span class="uppercase tracking-widest text-xs font-bold">Initialize Session</span>
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-muted text-xs uppercase tracking-widest" style="opacity: 0.3;">
            &copy; 2026 AQUATRACK INFRASTRUCTURE
        </p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script type="module">
        import { login } from './js/auth.js';
        import { initTheme } from './js/utils.js';
        
        initTheme();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            const originalText = loginBtn.innerText;
            loginBtn.innerText = 'VERIFYING...';
            
            try {
                await login(document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) {
                loginBtn.disabled = false;
                loginBtn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
